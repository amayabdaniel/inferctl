name: support-chat
model: qwen3:8b
context_length: 8192
quantization: q4_k_m
prompt_template: |
  You are a helpful customer support agent. Be concise and accurate.
tools:
  - name: lookup_order
    endpoint: http://orders-api/v1/lookup
observability:
  metrics: true
  tracing: true
scaling:
  min_replicas: 1
  max_replicas: 4
  target_tokens_per_second: 500
resources:
  gpu: nvidia-l4
  gpu_count: 1
  memory_mi: 16384
  cpu_cores: 4
security:
  prompt_injection_protection: true
  pii_redaction: true
